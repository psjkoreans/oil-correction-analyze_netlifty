<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Engine Oil Analyzer v4.2 (Edge-Calibrated Client-Server Architecture)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background: #f4f7f6; color: #333; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input[type="number"], input[type="file"] { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #004494; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #status { margin: 15px 0; font-weight: bold; color: #d9534f; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .report-box { margin-top: 20px; padding: 20px; background: #e9ecef; border-left: 5px solid #0056b3; border-radius: 4px; line-height: 1.6; }
        .highlight { font-weight: bold; color: #d9534f; }
        #imagePreview { max-width: 300px; margin-top: 15px; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>엔진 오일 정밀 분석기 (사전 캘리브레이션 및 클라우드 컴퓨팅 결합)</h2>
        <div class="input-group">
            <label for="mileageInput">신규 샘플 주행거리 (km): </label>
            <input type="number" id="mileageInput" placeholder="예: 60000" required>
            <input type="file" id="fileInput" accept="image/*" required>
            <button id="analyzeBtn" onclick="executeAnalysisPipeline()" disabled>시스템 초기화 중 (OpenCV 대기)...</button>
        </div>
        <img id="imagePreview" alt="업로드된 샘플 미리보기">
        <div id="status">상태: 사용자 입력 대기 중...</div>
    </div>

    <div class="chart-grid" id="chartArea" style="display: none;">
        <div class="chart-box"><canvas id="chartL"></canvas></div>
        <div class="chart-box"><canvas id="chartA"></canvas></div>
        <div class="chart-box"><canvas id="chartB"></canvas></div>
        <div class="chart-box"><canvas id="chartDegradation"></canvas></div>
    </div>

    <div id="analysisReport" class="report-box" style="display: none;"></div>

    <script>
        let cvReady = false;
        let chartInstances = {};

        // 주의: 아키텍처 최적화를 위해 이 과거 데이터는 향후 서버 DB로 이관되어야 합니다.
        const HISTORICAL_SEED_DATA = [
            { mileage: 5424, r: 182, g: 98, b: 7 },
            { mileage: 23767, r: 204, g: 136, b: 9 },
            { mileage: 25112, r: 228, g: 148, b: 13 },
            { mileage: 36982, r: 200, g: 118, b: 8 },
            { mileage: 108537, r: 115, g: 13, b: 1 },
            { mileage: 180294, r: 110, g: 16, b: 1 }
        ];

        function onOpenCvReady() {
            cvReady = true;
            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "데이터 추출 및 서버 분석 요청";
            btn.disabled = false;
            document.getElementById('status').innerText = "상태: OpenCV 모듈 로드 완료.";
        }

        // 이미지 파일 업로드 시 미리보기 렌더링
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('imagePreview');
                    img.src = event.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // 1. 클라이언트 측 영상 처리 및 캘리브레이션 행렬 투영
        function extractRobustRGB(imageElement) {
            let src = cv.imread(imageElement);
            let gray = new cv.Mat();
            let blurred = new cv.Mat();
            
            // 그레이스케일 변환 및 가우시안 블러를 통한 고주파 노이즈 제거
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
            cv.GaussianBlur(gray, blurred, new cv.Size(9, 9), 2, 2);

            // CLAHE (Contrast Limited Adaptive Histogram Equalization) 적용
            let clahe = new cv.CLAHE(2.0, new cv.Size(8, 8));
            let gray_clahe = new cv.Mat();
            clahe.apply(blurred, gray_clahe);

            // 형태학적 에지 검출 (Canny & Morphological Closing)
            let edges = new cv.Mat();
            cv.Canny(gray_clahe, edges, 50, 150);
            let kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(5, 5));
            let closed = new cv.Mat();
            cv.morphologyEx(edges, closed, cv.MORPH_CLOSE, kernel);

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(closed, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let bestMask = cv.Mat.zeros(src.rows, src.cols, cv.CV_8UC1);
            let maxArea = 0;
            let found = false;

            // 기하학적 원형도(Circularity)를 바탕으로 오일 드롭렛 마스킹
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area < 1000) continue;

                let perimeter = cv.arcLength(cnt, true);
                if (perimeter === 0) continue;

                let circularity = 4 * Math.PI * (area / (perimeter * perimeter));
                if (circularity > 0.8 && area > maxArea) {
                    maxArea = area;
                    bestMask.setTo(new cv.Scalar(0));
                    cv.drawContours(bestMask, contours, i, new cv.Scalar(255), -1);
                    
                    // 경계 노이즈를 제거하기 위한 침식(Erosion) 연산
                    let erodeKernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(15, 15));
                    cv.erode(bestMask, bestMask, erodeKernel, new cv.Point(-1, -1), 1);
                    erodeKernel.delete();
                    found = true;
                }
            }

            if (!found) {
                // 페일세이프: 허프 원 변환(Hough Circle Transform)
                let circles = new cv.Mat();
                cv.HoughCircles(blurred, circles, cv.HOUGH_GRADIENT, 1.2, 100, 50, 30, 20, 0);
                if (circles.cols > 0) {
                    let x = Math.round(circles.data32F[0]);
                    let y = Math.round(circles.data32F[1]);
                    let r = Math.round(circles.data32F[2]);
                    cv.circle(bestMask, new cv.Point(x, y), Math.round(r * 0.8), new cv.Scalar(255), -1);
                } else {
                    throw new Error("[치명적 오류] 타겟 객체(오일 샘플)를 영상에서 분리할 수 없습니다.");
                }
                circles.delete();
            }

            // 마스크 영역 내부의 원본 RGB 평균 추출
            let rawMean = cv.mean(src, bestMask);
            let rawR = rawMean[0], rawG = rawMean[1], rawB = rawMean[2];
            
            // --- 사전 도출된 전역 캘리브레이션 행렬 (M = A^-1 * B) ---
            // ※ 주의: 아래 행렬은 프로덕션 배포 전 반드시 실제 캘리브레이션 과정(3개의 기준색 측정)을 
            // 거쳐 산출된 고유 역행렬 값으로 교체해야 합니다. 현재는 근사된 임시 행렬입니다.
            const CALIBRATION_MATRIX = [
                [ 1.05, -0.02,  0.01], 
                [-0.01,  1.02, -0.03], 
                [ 0.02, -0.01,  0.98]  
            ];

            // 벡터 내적(Dot Product)을 통한 색공간 선형 변환
            let correctedR = (rawR * CALIBRATION_MATRIX[0][0]) + (rawG * CALIBRATION_MATRIX[1][0]) + (rawB * CALIBRATION_MATRIX[2][0]);
            let correctedG = (rawR * CALIBRATION_MATRIX[0][1]) + (rawG * CALIBRATION_MATRIX[1][1]) + (rawB * CALIBRATION_MATRIX[2][1]);
            let correctedB = (rawR * CALIBRATION_MATRIX[0][2]) + (rawG * CALIBRATION_MATRIX[1][2]) + (rawB * CALIBRATION_MATRIX[2][2]);

            // 물리적 색상 한계점 제어 (Clamping to 0~255)
            correctedR = Math.min(255, Math.max(0, correctedR));
            correctedG = Math.min(255, Math.max(0, correctedG));
            correctedB = Math.min(255, Math.max(0, correctedB));

            // 메모리 누수 방지를 위한 OpenCV 객체 명시적 삭제
            src.delete(); gray.delete(); blurred.delete(); clahe.delete(); gray_clahe.delete();
            edges.delete(); kernel.delete(); closed.delete(); contours.delete(); hierarchy.delete(); bestMask.delete();

            // 서버로 전송될 "보정된(Calibrated)" RGB 데이터 반환
            return { r: correctedR, g: correctedG, b: correctedB };
        }

        // 2. 통합 파이프라인 (클라이언트 추출 -> 서버 비선형 분석 요청 -> 데이터 시각화)
        async function executeAnalysisPipeline() {
            if (!cvReady) return alert("시스템 오류: OpenCV가 초기화되지 않았습니다.");
            
            const newMileage = parseFloat(document.getElementById('mileageInput').value);
            const imgElement = document.getElementById('imagePreview');
            const status = document.getElementById('status');
            
            if (isNaN(newMileage) || imgElement.style.display === 'none') {
                return alert("분석을 수행하기 위해 주행거리와 유효한 영상 샘플이 모두 필요합니다.");
            }

            status.innerText = "상태: 기하학적 타겟 분리 및 선형 대수학 기반 광학 보정 중...";

            try {
                // 선형 변환이 완료된 신규 RGB 픽셀 데이터 획득
                const newRgb = extractRobustRGB(imgElement); 
                
                // REST API 페이로드 구성
                const payload = [
                    ...HISTORICAL_SEED_DATA.map(item => ({...item, isNew: false})),
                    { mileage: newMileage, r: newRgb.r, g: newRgb.g, b: newRgb.b, isNew: true }
                ];

                status.innerText = "상태: Netlify 백엔드 서버로 L*a*b* 색차 변환 및 다변량 분석 요청 중...";

                const response = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || "서버 통신 스트림 오류");
                }

                const result = await response.json();

                status.innerText = "상태: 서버 컴퓨팅 완료. 로컬 대시보드 토폴로지 렌더링 중...";
                renderDashboard(result.data);
                document.getElementById('chartArea').style.display = 'grid';
                status.innerText = "상태: 분석 파이프라인이 성공적으로 종료되었습니다.";

            } catch (error) {
                console.error("시스템 장애:", error);
                status.innerText = "분석 실패: " + error.message;
            }
        }

        // 3. 차트 렌더링 (Chart.js 기반 다차원 궤적 시각화)
        function renderDashboard(data) {
            const labels = data.map(d => d.x);
            
            function updateChart(canvasId, label, yData, yAxisLabel, lineColor) {
                if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
                
                chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: label,
                            data: yData,
                            borderColor: lineColor,
                            pointBackgroundColor: data.map(d => d.isNew ? '#FF0000' : d.pointColor),
                            pointRadius: data.map(d => d.isNew ? 8 : 4),
                            pointBorderColor: '#000',
                            fill: false,
                            tension: 0.1,
                            order: data.map(d => d.isNew ? 1 : 10) 
                        }]
                    },
                    options: { responsive: true, scales: { x: { title: { display: true, text: 'Mileage (km)' } }, y: { title: { display: true, text: yAxisLabel } } } }
                });
            }

            updateChart('chartL', 'CIE L* (명도 감소 궤적)', data.map(d => d.L), 'L* Value', '#555');
            updateChart('chartA', 'CIE a* (Red/Green 편향)', data.map(d => d.a), 'a* Value', '#d9534f');
            updateChart('chartB', 'CIE b* (Yellow/Blue 편향)', data.map(d => d.b), 'b* Value', '#f0ad4e');
            updateChart('chartDegradation', '종합 오염도 (Calculated DI)', data.map(d => d.y), 'Degradation Index (\u0394E)', '#5cb85c');

            generateAnalysisReport(data);
        }

        // 4. 알고리즘 기반 진단 리포트 생성
        function generateAnalysisReport(data) {
            const newSample = data.find(d => d.isNew);
            const historicalData = data.filter(d => !d.isNew);
            const reportDiv = document.getElementById('analysisReport');
            
            if (!newSample) return;

            let html = `<h3>[인공지능 궤적 분석 리포트] 신규 샘플 (주행거리 ${newSample.x.toLocaleString()}km)</h3>`;
            html += `<p>업로드된 엔진 오일 샘플의 현재 광학적 열화 임계 상태는 <strong>[${newSample.phase}]</strong> 로 판정되었습니다.</p>`;

            if (newSample.needsReplacement) {
                html += `<p class="highlight">⚠️ 치명적 경고: 다변량 열화 지표가 기계적 안전 한계선을 초과했습니다. 엔진의 비가역적 마모를 방지하기 위해 즉각적인 오일 교체를 강력히 권고합니다.</p>`;
            }

            if (historicalData.length > 0) {
                const nearestSample = historicalData.reduce((prev, curr) => Math.abs(curr.x - newSample.x) < Math.abs(prev.x - newSample.x) ? curr : prev);
                const mileageDiff = Math.abs(newSample.x - nearestSample.x).toLocaleString();
                const degDiff = (newSample.y - nearestSample.y).toFixed(2);
                
                html += `<p><strong>비교 궤적 분석:</strong> 가장 인접한 과거 노드(${nearestSample.x.toLocaleString()}km, 오차 ${mileageDiff}km)와 데이터 편차를 분석한 결과, `;
                
                if (degDiff > 5.0) html += `오염도가 <span class="highlight">비정상적인 수준으로 급증(+${degDiff})</span>하였습니다. 블로우바이 가스 침투나 열분해(Thermal Breakdown) 여부를 점검하십시오.</p>`;
                else if (degDiff < -2.0) html += `오염도가 수학적 모델을 이탈하여 감소(${degDiff})하였습니다. 최근 신유(Virgin Oil)를 보충한 이력이 있는지 교차 검증하십시오.</p>`;
                else html += `오염도 변동폭(${degDiff > 0 ? '+' : ''}${degDiff})이 내장된 정상 열화 감쇠(Decay) 모델을 안정적으로 추종하고 있습니다.</p>`;
            }

            reportDiv.innerHTML = html;
            reportDiv.style.display = 'block';
        }
    </script>
</body>
</html>
